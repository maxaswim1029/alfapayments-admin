<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — AlfaPayments</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red:    #EF3124;
  --red-dk: #c9271b;
  --blue:   #2563eb;
  --green:  #16a34a;
  --amber:  #d97706;
  --gray:   #6b7280;
  --text:   #0d0d0d;
  --text2:  #555;
  --text3:  #9ca3af;
  --border: #e5e7eb;
  --bg:     #f9fafb;
  --white:  #ffffff;
  --radius: 10px;
}
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg); color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ── LOGIN ── */
.login-overlay {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, #f9fafb 0%, #f1f3f5 100%);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
}
.login-box {
  background: var(--white); border-radius: 16px; padding: 48px 44px;
  width: 380px; text-align: center;
  box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 8px 32px rgba(0,0,0,.08);
  border: 1px solid var(--border);
}
.login-mark {
  width: 48px; height: 4px; background: var(--red);
  border-radius: 2px; margin: 0 auto 24px;
}
.login-logo {
  font-size: 20px; font-weight: 800; letter-spacing: -0.04em;
  color: var(--text); margin-bottom: 6px;
}
.login-logo span { color: var(--red); }
.login-sub { font-size: 13px; color: var(--text3); margin-bottom: 32px; }
.login-box input {
  width: 100%; padding: 12px 16px;
  border: 1.5px solid var(--border); border-radius: var(--radius);
  font-size: 14px; font-family: inherit; outline: none;
  transition: border-color .15s; margin-bottom: 10px;
  color: var(--text);
}
.login-box input:focus { border-color: var(--red); }
.login-btn {
  width: 100%; padding: 13px; background: var(--red); color: #fff;
  border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600;
  font-family: inherit; cursor: pointer; transition: background .15s;
}
.login-btn:hover { background: var(--red-dk); }
.login-error { color: var(--red); font-size: 12px; margin-top: 12px; min-height: 18px; }

/* ── PANEL ── */
.panel { display: none; min-height: 100vh; }

/* ── HEADER ── */
header {
  background: var(--white);
  border-bottom: 3px solid var(--red);
  padding: 0 32px; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
  position: sticky; top: 0; z-index: 50;
}
.hdr-left { display: flex; align-items: center; gap: 20px; }
.hdr-logo {
  font-size: 16px; font-weight: 800; letter-spacing: -0.03em; color: var(--text);
}
.hdr-logo span { color: var(--red); }
.hdr-sep { width: 1px; height: 18px; background: var(--border); }
.hdr-title { font-size: 13px; color: var(--text3); font-weight: 500; }
.hdr-right { display: flex; align-items: center; gap: 14px; }
.hdr-clock { font-size: 12px; color: var(--text3); }
.logout-btn {
  font-size: 12px; color: var(--text2); background: none;
  border: 1.5px solid var(--border); border-radius: 8px;
  padding: 6px 14px; cursor: pointer; font-family: inherit;
  transition: border-color .15s, color .15s;
}
.logout-btn:hover { border-color: var(--red); color: var(--red); }

/* ── STATS ── */
.stats-row { display: flex; gap: 14px; padding: 24px 32px 0; flex-wrap: wrap; }
.stat-card {
  background: var(--white); border-radius: var(--radius); padding: 20px 22px;
  border: 1px solid var(--border); flex: 1; min-width: 140px;
  border-top: 3px solid transparent; position: relative;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.stat-card.c-red   { border-top-color: var(--red);   }
.stat-card.c-blue  { border-top-color: var(--blue);  }
.stat-card.c-green { border-top-color: var(--green); }
.stat-card.c-amber { border-top-color: var(--amber); }
.stat-label {
  font-size: 11px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px;
}
.stat-value { font-size: 30px; font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
.stat-value.c-red   { color: var(--red);   }
.stat-value.c-blue  { color: var(--blue);  }
.stat-value.c-green { color: var(--green); }
.stat-value.c-amber { color: var(--amber); }

/* ── FILTER BAR ── */
.filter-bar {
  display: flex; gap: 10px; padding: 18px 32px;
  align-items: center; flex-wrap: wrap;
}
.search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 360px; }
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text3); pointer-events: none;
}
.search-input {
  width: 100%; padding: 9px 14px 9px 36px;
  border: 1.5px solid var(--border); border-radius: var(--radius);
  font-size: 13px; font-family: inherit; outline: none; background: var(--white);
  transition: border-color .15s; color: var(--text);
}
.search-input:focus { border-color: var(--red); }
.filter-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
.ftab {
  padding: 7px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
  border: 1.5px solid var(--border); background: var(--white);
  cursor: pointer; color: var(--text2); transition: all .15s;
  font-family: inherit; white-space: nowrap;
}
.ftab:hover { border-color: #ccc; }
.ftab.active         { background: var(--text); color: #fff; border-color: var(--text); }
.ftab.active.s-new   { background: var(--blue);  border-color: var(--blue);  }
.ftab.active.s-qual  { background: var(--green); border-color: var(--green); }
.ftab.active.s-unq   { background: var(--amber); border-color: var(--amber); }
.refresh-btn {
  padding: 7px 14px; border-radius: var(--radius); font-size: 12px;
  border: 1.5px solid var(--border); background: var(--white);
  cursor: pointer; color: var(--text2); font-family: inherit;
  transition: background .15s; white-space: nowrap;
}
.refresh-btn:hover { background: #f3f4f6; }

/* ── TABLE ── */
.table-wrap {
  margin: 0 32px 32px;
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: auto;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  padding: 11px 16px; text-align: left;
  font-size: 10px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: .08em;
  border-bottom: 1px solid var(--border);
  white-space: nowrap; background: #fafafa;
  position: sticky; top: 0; z-index: 1;
}
td { padding: 13px 16px; border-bottom: 1px solid #f3f4f6; vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafafa; }

.c-id   { color: var(--text3); font-size: 11px; font-weight: 500; }
.c-date { font-size: 11px; color: var(--text3); white-space: nowrap; }
.c-name { font-weight: 600; font-size: 13px; color: var(--text); }
.c-phone{ color: var(--red); font-weight: 500; font-size: 12px; margin-top: 3px; }
.tg-badge {
  display: inline-block; font-size: 10px; font-weight: 600;
  background: #e0f2fe; color: #0284c7; padding: 2px 7px;
  border-radius: 4px; margin-top: 4px; letter-spacing: .02em;
}
.c-type    { font-size: 11px; color: var(--text2); white-space: nowrap; }
.c-currency{ font-size: 12px; white-space: nowrap; font-weight: 500; }
.c-dest    { max-width: 160px; word-break: break-word; font-size: 12px; color: var(--text2); }
.c-amount  { white-space: nowrap; font-size: 12px; }
.c-comment { max-width: 130px; color: var(--text3); font-size: 12px; word-break: break-word; }

/* ── STATUS CELL ── */
.status-cell { min-width: 220px; }
.status-select {
  width: 100%; padding: 7px 10px; border-radius: 8px;
  border: 1.5px solid var(--border); font-size: 12px; font-weight: 600;
  font-family: inherit; background: var(--white); cursor: pointer; outline: none;
  transition: border-color .15s;
}
.status-select.new        { color: var(--blue);  border-color: #bfdbfe; background: #eff6ff; }
.status-select.qualified  { color: var(--green); border-color: #bbf7d0; background: #f0fdf4; }
.status-select.unqualified{ color: var(--amber); border-color: #fde68a; background: #fffbeb; }
.substatus-select {
  width: 100%; margin-top: 6px; padding: 6px 10px; border-radius: 8px;
  border: 1.5px solid #bbf7d0; font-size: 12px; font-family: inherit;
  background: #f0fdf4; color: var(--green); cursor: pointer; outline: none;
}
.reason-textarea {
  width: 100%; margin-top: 6px; padding: 7px 10px; border-radius: 8px;
  border: 1.5px solid #fde68a; font-size: 12px; color: #92400e;
  font-family: inherit; outline: none; resize: vertical; min-height: 56px;
  background: #fffbeb;
}
.reason-textarea:focus, .substatus-select:focus { border-color: var(--red); outline: none; }
.save-ind { font-size: 11px; margin-top: 4px; min-height: 16px; font-weight: 500; }
.save-ind.saving { color: var(--text3); }
.save-ind.saved  { color: var(--green); }
.save-ind.err    { color: var(--red);   }

.empty-row td {
  text-align: center; padding: 64px; color: var(--text3);
  font-size: 14px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <div class="login-mark"></div>
    <div class="login-logo">Alfa<span>Payments</span></div>
    <div class="login-sub">Панель управления заявками</div>
    <input type="password" id="pwd-input" placeholder="Пароль"
      onkeydown="if(event.key==='Enter') doLogin()">
    <button class="login-btn" onclick="doLogin()">Войти</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- PANEL -->
<div class="panel" id="panel">
  <header>
    <div class="hdr-left">
      <div class="hdr-logo">Alfa<span>Payments</span></div>
      <div class="hdr-sep"></div>
      <div class="hdr-title">Панель управления</div>
    </div>
    <div class="hdr-right">
      <span class="hdr-clock" id="hdr-clock"></span>
      <button class="logout-btn" onclick="doLogout()">Выйти</button>
    </div>
  </header>

  <div class="stats-row">
    <div class="stat-card c-red">
      <div class="stat-label">Всего заявок</div>
      <div class="stat-value c-red" id="st-total">—</div>
    </div>
    <div class="stat-card c-blue">
      <div class="stat-label">Новые</div>
      <div class="stat-value c-blue" id="st-new">—</div>
    </div>
    <div class="stat-card c-green">
      <div class="stat-label">Квалифицированные</div>
      <div class="stat-value c-green" id="st-qual">—</div>
    </div>
    <div class="stat-card c-amber">
      <div class="stat-label">Неквалифицированные</div>
      <div class="stat-value c-amber" id="st-unqual">—</div>
    </div>
  </div>

  <div class="filter-bar">
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input class="search-input" id="search-input"
        placeholder="Поиск по имени, телефону, email…" oninput="renderTable()">
    </div>
    <div class="filter-tabs">
      <button class="ftab active"   onclick="setFilter('all',this)">Все</button>
      <button class="ftab s-new"    onclick="setFilter('new',this)">Новые</button>
      <button class="ftab s-qual"   onclick="setFilter('qualified',this)">Квалифицированные</button>
      <button class="ftab s-unq"    onclick="setFilter('unqualified',this)">Неквалифицированные</button>
    </div>
    <button class="refresh-btn" onclick="loadAndRender()">↻ Обновить</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Дата</th>
          <th>Клиент</th>
          <th>Email</th>
          <th>Тип</th>
          <th>Валюта</th>
          <th>Получатель</th>
          <th>Сумма</th>
          <th>Комментарий</th>
          <th>Статус</th>
        </tr>
      </thead>
      <tbody id="leads-tbody">
        <tr class="empty-row"><td colspan="10">Загрузка…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://rnotzuhfdoopdawheztd.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJub3R6dWhmZG9vcGRhd2hlenRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NzI5NTIsImV4cCI6MjA5NzA0ODk1Mn0.HNfUq4YOWBMPPWg9mWwaOL0xjv23X-8dQLPPVqpu0K8';
const ADMIN_PASSWORD = 'Alfa2025!';

let allLeads = [];
let currentFilter = 'all';

/* ── AUTH ── */
function doLogin() {
  const pwd = document.getElementById('pwd-input').value;
  if (pwd === ADMIN_PASSWORD) {
    sessionStorage.setItem('admin_ok', '1');
    showPanel();
  } else {
    document.getElementById('login-error').textContent = 'Неверный пароль';
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}
function doLogout() { sessionStorage.removeItem('admin_ok'); location.reload(); }
function showPanel() {
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('panel').style.display = 'block';
  loadAndRender(); startClock();
}
/* ── API ── */
const hdrs = {
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Content-Type': 'application/json'
};

if (sessionStorage.getItem('admin_ok')) showPanel();

function startClock() {
  function tick() {
    document.getElementById('hdr-clock').textContent =
      new Date().toLocaleString('ru', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }
  tick(); setInterval(tick, 10000);
}

async function loadAndRender() {
  const tbody = document.getElementById('leads-tbody');
  tbody.innerHTML = '<tr class="empty-row"><td colspan="10">Загрузка…</td></tr>';
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/leads?order=created_at.desc&select=*', { headers: hdrs });
    if (!res.ok) throw new Error(await res.text());
    allLeads = await res.json();
    updateStats(); renderTable();
  } catch(e) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="10" style="color:#EF3124">Ошибка загрузки: ' + e.message + '</td></tr>';
  }
}

async function patchLead(id, data) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/leads?id=eq.' + id, {
    method: 'PATCH',
    headers: Object.assign({}, hdrs, { 'Prefer': 'return=minimal' }),
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error(await res.text());
}

/* ── STATS ── */
function updateStats() {
  document.getElementById('st-total').textContent = allLeads.length;
  document.getElementById('st-new').textContent   = allLeads.filter(l => l.status === 'new').length;
  document.getElementById('st-qual').textContent  = allLeads.filter(l => l.status === 'qualified').length;
  document.getElementById('st-unqual').textContent= allLeads.filter(l => l.status === 'unqualified').length;
}

/* ── FILTER ── */
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

/* ── RENDER ── */
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(iso) {
  return new Date(iso).toLocaleString('ru', {
    day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit'
  });
}

function renderTable() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let leads = allLeads;
  if (currentFilter !== 'all') leads = leads.filter(l => l.status === currentFilter);
  if (q) leads = leads.filter(l =>
    (l.name||'').toLowerCase().includes(q) ||
    (l.phone||'').toLowerCase().includes(q) ||
    (l.email||'').toLowerCase().includes(q)
  );
  const tbody = document.getElementById('leads-tbody');
  if (!leads.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="10">Заявок не найдено</td></tr>';
    return;
  }
  tbody.innerHTML = leads.map(rowHtml).join('');
}

function rowHtml(l) {
  const typeLabel = l.client_type === 'individual' ? 'Физлицо' :
                    l.client_type === 'company'     ? 'Юрлицо / ИП' : (l.client_type || '');
  const statusOpts = [
    ['new',         'Новая'],
    ['qualified',   'Квалифицированный лид'],
    ['unqualified', 'Неквалифицированный лид']
  ].map(([v,lbl]) =>
    '<option value="' + v + '"' + (l.status === v ? ' selected' : '') + '>' + lbl + '</option>'
  ).join('');

  let secondary = '';
  if (l.status === 'qualified') {
    const subOpts = [
      ['',             '— Выберите подстатус —'],
      ['chat_created', 'Чат создан'],
      ['ad_signed',    'АД подписан'],
      ['first_payment','Первый платёж']
    ].map(([v,lbl]) =>
      '<option value="' + v + '"' + (l.substatus === v ? ' selected' : '') + '>' + lbl + '</option>'
    ).join('');
    secondary = '<select class="substatus-select" onchange="onSubstatus(' + l.id + ',this)">' + subOpts + '</select>';
  } else if (l.status === 'unqualified') {
    secondary = '<textarea class="reason-textarea" placeholder="Причина отказа…" onblur="onReason(' + l.id + ',this)">' + esc(l.status_reason) + '</textarea>';
  }

  return '<tr id="row-' + l.id + '">' +
    '<td class="c-id">' + l.id + '</td>' +
    '<td class="c-date">' + fmtDate(l.created_at) + '</td>' +
    '<td><div class="c-name">' + esc(l.name) + '</div>' +
         '<div class="c-phone">' + esc(l.phone) + '</div>' +
         (l.tg_linked ? '<span class="tg-badge">TG</span>' : '') + '</td>' +
    '<td style="font-size:12px;word-break:break-all;color:#555">' + esc(l.email || '—') + '</td>' +
    '<td class="c-type">' + typeLabel + '</td>' +
    '<td class="c-currency">' + esc(l.currency || '') + '</td>' +
    '<td class="c-dest">' + esc(l.destination || '') + '</td>' +
    '<td class="c-amount">' + esc(l.amount || '—') + '</td>' +
    '<td class="c-comment">' + esc(l.comment || '') + '</td>' +
    '<td class="status-cell">' +
      '<select class="status-select ' + (l.status || 'new') + '" onchange="onStatus(' + l.id + ',this)">' + statusOpts + '</select>' +
      secondary +
      '<div class="save-ind" id="ind-' + l.id + '"></div>' +
    '</td>' +
  '</tr>';
}

/* ── UPDATES ── */
function setInd(id, cls, msg) {
  const el = document.getElementById('ind-' + id);
  if (el) { el.className = 'save-ind ' + cls; el.textContent = msg; }
}

async function onStatus(id, sel) {
  const status = sel.value;
  sel.className = 'status-select ' + status;
  setInd(id, 'saving', 'Сохраняем…');
  const patch = { status };
  if (status !== 'qualified')   patch.substatus     = null;
  if (status !== 'unqualified') patch.status_reason  = null;
  try {
    await patchLead(id, patch);
    const lead = allLeads.find(l => l.id === id);
    if (lead) Object.assign(lead, patch);
    const row = document.getElementById('row-' + id);
    if (row && lead) row.outerHTML = rowHtml(lead);
    setInd(id, 'saved', '✓ Сохранено');
    updateStats();
    setTimeout(() => setInd(id, '', ''), 2000);
  } catch(e) { setInd(id, 'err', '✗ Ошибка'); }
}

async function onSubstatus(id, sel) {
  const substatus = sel.value || null;
  setInd(id, 'saving', 'Сохраняем…');
  try {
    await patchLead(id, { substatus });
    const lead = allLeads.find(l => l.id === id);
    if (lead) lead.substatus = substatus;
    setInd(id, 'saved', '✓ Сохранено');
    setTimeout(() => setInd(id, '', ''), 2000);
  } catch(e) { setInd(id, 'err', '✗ Ошибка'); }
}

async function onReason(id, ta) {
  const status_reason = ta.value.trim() || null;
  setInd(id, 'saving', 'Сохраняем…');
  try {
    await patchLead(id, { status_reason });
    const lead = allLeads.find(l => l.id === id);
    if (lead) lead.status_reason = status_reason;
    setInd(id, 'saved', '✓ Сохранено');
    setTimeout(() => setInd(id, '', ''), 2000);
  } catch(e) { setInd(id, 'err', '✗ Ошибка'); }
}
</script>
</body>
</html>
